<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3상 차단기 단락시험 GUI</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141d35;
      --line: #2f3e67;
      --text: #ecf1ff;
      --muted: #a8b2d3;
      --a: #ff6b6b;
      --b: #4ecdc4;
      --c: #ffe66d;
      --trv: #c792ea;
      --trip: #7fdbff;
      --ok: #6ee7a8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 10% 0%, #1f2d57 0%, var(--bg) 45%);
      color: var(--text);
      font-family: Inter, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 1280px;
      margin: 20px auto;
      padding: 0 14px 24px;
      display: grid;
      gap: 14px;
    }
    .panel {
      border: 1px solid #2d3b63;
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel) 90%, black);
      padding: 14px;
    }
    h1 { margin: 0 0 6px; font-size: 1.3rem; }
    .desc { margin: 0; color: var(--muted); font-size: 0.93rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    label { display: block; color: var(--muted); font-size: 0.82rem; }
    input[type="number"], input[type="range"] {
      width: 100%;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #3b4c79;
      background: #0e162f;
      color: var(--text);
      padding: 8px;
    }
    .trip-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    .trip-badge {
      background: #0f1d3a;
      border: 1px solid #395081;
      padding: 8px 10px;
      border-radius: 8px;
      font-variant-numeric: tabular-nums;
      color: var(--ok);
      min-width: 145px;
      text-align: center;
    }

    .metrics {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
    }
    .card {
      border: 1px solid #32436e;
      background: #0d152c;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.86rem;
    }
    .card strong {
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
      font-size: 0.8rem;
    }

    #plot {
      width: 100%;
      height: 560px;
      border: 1px solid #2d3b63;
      border-radius: 10px;
      background: #080f22;
      display: block;
      cursor: ew-resize;
      touch-action: none;
    }
    .legend {
      margin-top: 8px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.84rem;
    }
    .legend span::before {
      content: "";
      width: 14px;
      height: 2px;
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }
    .a::before { background: var(--a); }
    .b::before { background: var(--b); }
    .c::before { background: var(--c); }
    .trv::before { background: var(--trv); }
    .trip::before { background: var(--trip); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>차단기 3상 단락시험 시뮬레이터 (HTML GUI)</h1>
      <p class="desc">차단 지령 시점을 슬라이더/마우스 드래그로 이동하면, 상별 전류 차단(0-cross 기반)과 TRV 발생이 즉시 반영됩니다.</p>

      <div class="grid">
        <label>정격전압 (kV, 선간 RMS)
          <input id="ratedVoltage" type="number" min="1" step="1" value="170" />
        </label>
        <label>정격전류 (kA RMS)
          <input id="ratedCurrent" type="number" min="0.1" step="0.1" value="50" />
        </label>
        <label>주파수 (Hz)
          <input id="frequency" type="number" min="1" step="1" value="60" />
        </label>
        <label>kpp (TRV peak factor)
          <input id="kpp" type="number" min="0.1" step="0.1" value="2.0" />
        </label>
        <label>X/R 비
          <input id="xr" type="number" min="1" step="1" value="15" />
        </label>
        <label>DC offset 초기 위상각 (deg)
          <input id="faultAngle" type="number" min="0" max="180" step="1" value="90" />
        </label>
      </div>

      <div class="trip-row">
        <input id="tripTime" type="range" min="0" max="120" step="0.1" value="35" />
        <div id="tripLabel" class="trip-badge">차단 지령: 35.0 ms</div>
      </div>

      <div class="metrics">
        <div class="card"><strong>A상 실제 차단시점</strong><span id="iaOpen"></span></div>
        <div class="card"><strong>B상 실제 차단시점</strong><span id="ibOpen"></span></div>
        <div class="card"><strong>C상 실제 차단시점</strong><span id="icOpen"></span></div>
        <div class="card"><strong>차단 직전 최대 전류</strong><span id="iMaxBefore"></span></div>
        <div class="card"><strong>예상 TRV 피크(근사)</strong><span id="trvPeak"></span></div>
        <div class="card"><strong>감쇠 시정수 τ=L/R</strong><span id="tau"></span></div>
      </div>
    </section>

    <section class="panel">
      <canvas id="plot" width="1240" height="560" aria-label="3상 전압/전류/TRV 파형"></canvas>
      <div class="legend">
        <span class="a">A상</span>
        <span class="b">B상</span>
        <span class="c">C상</span>
        <span class="trv">TRV (각 상 합성 표시)</span>
        <span class="trip">차단 지령 시점</span>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('plot');
    const ctx = canvas.getContext('2d');
    const controls = {
      ratedVoltage: document.getElementById('ratedVoltage'),
      ratedCurrent: document.getElementById('ratedCurrent'),
      frequency: document.getElementById('frequency'),
      kpp: document.getElementById('kpp'),
      xr: document.getElementById('xr'),
      faultAngle: document.getElementById('faultAngle'),
      tripTime: document.getElementById('tripTime'),
    };
    const labels = {
      trip: document.getElementById('tripLabel'),
      iaOpen: document.getElementById('iaOpen'),
      ibOpen: document.getElementById('ibOpen'),
      icOpen: document.getElementById('icOpen'),
      iMaxBefore: document.getElementById('iMaxBefore'),
      trvPeak: document.getElementById('trvPeak'),
      tau: document.getElementById('tau'),
    };

    const C = {
      a: '#ff6b6b', b: '#4ecdc4', c: '#ffe66d', trv: '#c792ea', trip: '#7fdbff',
      grid: '#2f3e67', text: '#a8b2d3'
    };

    const T_MAX_MS = 120;
    const N = 3000;
    let dragging = false;

    const phaseShift = [0, -2 * Math.PI / 3, 2 * Math.PI / 3];

    function sgn(n) { return n >= 0 ? 1 : -1; }

    function getParams() {
      const vLL = Math.max(0.1, Number(controls.ratedVoltage.value)) * 1000;
      const iRms = Math.max(0.01, Number(controls.ratedCurrent.value)) * 1000;
      const f = Math.max(1, Number(controls.frequency.value));
      const kpp = Math.max(0.1, Number(controls.kpp.value));
      const xr = Math.max(1, Number(controls.xr.value));
      const faultAngle = Number(controls.faultAngle.value) * Math.PI / 180;
      const tCmdMs = Number(controls.tripTime.value);

      const vp = (vLL / Math.sqrt(3)) * Math.sqrt(2);
      const ip = iRms * Math.sqrt(2);
      const w = 2 * Math.PI * f;
      const tau = xr / w;

      return { vp, ip, f, w, kpp, xr, tau, faultAngle, tCmdMs };
    }

    function findNextCurrentZero(tCmd, phi, w) {
      const target = w * tCmd + phi;
      const k = Math.ceil(target / Math.PI);
      return (k * Math.PI - phi) / w;
    }

    function buildWave() {
      const p = getParams();
      const tMax = T_MAX_MS / 1000;
      const dt = tMax / (N - 1);
      const tCmd = p.tCmdMs / 1000;

      const openTimes = phaseShift.map((ph) => findNextCurrentZero(tCmd, ph, p.w));

      const V = [new Array(N), new Array(N), new Array(N)];
      const I = [new Array(N), new Array(N), new Array(N)];
      const TRV = [new Array(N), new Array(N), new Array(N)];
      const TRVsum = new Array(N);

      let maxAbs = 1;
      let maxIBefore = 0;

      for (let i = 0; i < N; i++) {
        const t = i * dt;
        let trvMix = 0;

        for (let ph = 0; ph < 3; ph++) {
          const sh = phaseShift[ph];
          const vs = p.vp * Math.sin(p.w * t + sh);

          const iSym = p.ip * Math.sin(p.w * t + sh);
          const dcOffset = -p.ip * Math.sin(p.faultAngle + sh) * Math.exp(-t / p.tau);
          const iRaw = iSym + dcOffset;

          const interrupted = t >= openTimes[ph];
          const iVal = interrupted ? 0 : iRaw;
          if (!interrupted) maxIBefore = Math.max(maxIBefore, Math.abs(iVal));

          let trvVal = 0;
          if (interrupted) {
            const tt = t - openTimes[ph];
            const wN = 2.3 * p.w;
            const damp = Math.exp(-tt / (0.75 * p.tau));
            trvVal = p.kpp * p.vp * (1 - Math.cos(wN * tt)) * damp * sgn(Math.sin(p.w * openTimes[ph] + sh));
          }

          V[ph][i] = vs;
          I[ph][i] = iVal;
          TRV[ph][i] = trvVal;
          trvMix += trvVal;

          maxAbs = Math.max(maxAbs, Math.abs(vs), Math.abs(iVal), Math.abs(trvVal));
        }
        TRVsum[i] = trvMix / 3;
        maxAbs = Math.max(maxAbs, Math.abs(TRVsum[i]));
      }

      return { p, openTimes, V, I, TRVsum, maxAbs, maxIBefore };
    }

    function drawGrid(area, yDiv) {
      ctx.strokeStyle = C.grid;
      ctx.lineWidth = 1;
      for (let i = 0; i <= yDiv; i++) {
        const y = area.y + (i / yDiv) * area.h;
        ctx.beginPath();
        ctx.moveTo(area.x, y);
        ctx.lineTo(area.x + area.w, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 12; i++) {
        const x = area.x + (i / 12) * area.w;
        ctx.beginPath();
        ctx.moveTo(x, area.y);
        ctx.lineTo(x, area.y + area.h);
        ctx.stroke();
      }
    }

    function drawSeries(series, color, mapX, mapY, width = 1.7) {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(mapX(0), mapY(series[0]));
      for (let i = 1; i < N; i++) ctx.lineTo(mapX(i), mapY(series[i]));
      ctx.stroke();
    }

    function draw() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const data = buildWave();
      const { p, openTimes, V, I, TRVsum, maxAbs, maxIBefore } = data;

      const pad = { l: 58, r: 18, t: 20, b: 30 };
      const graphW = w - pad.l - pad.r;
      const zoneH = (h - pad.t - pad.b - 24) / 3;

      const zones = [
        { x: pad.l, y: pad.t, w: graphW, h: zoneH, title: '전압 Va/Vb/Vc' },
        { x: pad.l, y: pad.t + zoneH + 12, w: graphW, h: zoneH, title: '전류 Ia/Ib/Ic (차단 후 0)' },
        { x: pad.l, y: pad.t + (zoneH + 12) * 2, w: graphW, h: zoneH, title: 'TRV (합성 표시)' },
      ];

      const mapX = (i) => pad.l + (i / (N - 1)) * graphW;
      const mapY = (z) => (v) => z.y + z.h * (0.5 - 0.46 * (v / maxAbs));

      zones.forEach((z, idx) => {
        drawGrid(z, 8);
        ctx.fillStyle = C.text;
        ctx.font = '12px sans-serif';
        ctx.fillText(z.title, z.x + 6, z.y + 14);

        if (idx === 0) {
          drawSeries(V[0], C.a, mapX, mapY(z), 1.4);
          drawSeries(V[1], C.b, mapX, mapY(z), 1.4);
          drawSeries(V[2], C.c, mapX, mapY(z), 1.4);
        } else if (idx === 1) {
          drawSeries(I[0], C.a, mapX, mapY(z), 1.8);
          drawSeries(I[1], C.b, mapX, mapY(z), 1.8);
          drawSeries(I[2], C.c, mapX, mapY(z), 1.8);
        } else {
          drawSeries(TRVsum, C.trv, mapX, mapY(z), 2.0);
        }
      });

      const cmdX = pad.l + (p.tCmdMs / T_MAX_MS) * graphW;
      ctx.setLineDash([7, 5]);
      ctx.strokeStyle = C.trip;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cmdX, pad.t);
      ctx.lineTo(cmdX, h - pad.b);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = C.text;
      ctx.font = '12px sans-serif';
      ctx.fillText('0 ms', pad.l, h - 8);
      ctx.fillText(`${T_MAX_MS} ms`, w - 58, h - 8);

      const trvPeak = p.kpp * p.vp;
      labels.trip.textContent = `차단 지령: ${p.tCmdMs.toFixed(1)} ms`;
      labels.iaOpen.textContent = `${(openTimes[0] * 1000).toFixed(2)} ms`;
      labels.ibOpen.textContent = `${(openTimes[1] * 1000).toFixed(2)} ms`;
      labels.icOpen.textContent = `${(openTimes[2] * 1000).toFixed(2)} ms`;
      labels.iMaxBefore.textContent = `${(maxIBefore / 1000).toFixed(2)} kA`;
      labels.trvPeak.textContent = `${(trvPeak / 1000).toFixed(1)} kV (kpp·Vph_peak)`;
      labels.tau.textContent = `${(p.tau * 1000).toFixed(2)} ms (X/R=${p.xr.toFixed(1)})`;
    }

    function setTripByClientX(clientX) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.max(rect.left, Math.min(clientX, rect.right));
      const ratio = (x - rect.left) / rect.width;
      controls.tripTime.value = (ratio * T_MAX_MS).toFixed(2);
      draw();
    }

    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      setTripByClientX(e.clientX);
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      setTripByClientX(e.clientX);
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    canvas.addEventListener('touchstart', (e) => {
      dragging = true;
      setTripByClientX(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });
    window.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      setTripByClientX(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });
    window.addEventListener('touchend', () => { dragging = false; });

    Object.values(controls).forEach((c) => c.addEventListener('input', draw));
    draw();
  </script>
</body>
</html>
